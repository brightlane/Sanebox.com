name: Auto Head Inject

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'head-inject.js'

jobs:
  inject:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Find and run injector
        run: |
          SCRIPT=$(find . -maxdepth 1 -name "head-inject.js" | head -1)
          echo "Script: $SCRIPT"
          node "$SCRIPT"

      - name: Commit patched files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: auto head-inject [skip ci]"
          git push

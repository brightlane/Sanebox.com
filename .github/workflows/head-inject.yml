name: Update RSS Feed

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'feed.xml'

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update feed lastBuildDate
        run: |
          DATE=$(date -u "+%a, %d %b %Y %H:%M:%S GMT")
          if [ -f feed.xml ]; then
            sed -i "s|<lastBuildDate>.*</lastBuildDate>|<lastBuildDate>${DATE}</lastBuildDate>|" feed.xml
            echo "Updated lastBuildDate to: $DATE"
          else
            echo "feed.xml not found — skipping"
          fi

      - name: Commit updated feed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update feed [skip ci]"
          git push
